<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamon Era - Final Global Edition</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        :root { --netflix-red: #E50914; --bg-dark: #0f0f0f; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: white; overflow-x: hidden; margin: 0; }
        
        /* Glassmorphism Style */
        .glass { 
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
        }
        
        .nav-scrolled { background: rgba(0, 0, 0, 0.9); padding: 10px 0 !important; }
        
        /* Movie Card Animation */
        .movie-card { transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; }
        .movie-card:hover { transform: scale(1.08); z-index: 40; }
        .card-overlay { background: linear-gradient(to top, rgba(0,0,0,1) 0%, transparent 100%); opacity: 0; transition: 0.3s ease; }
        .movie-card:hover .card-overlay { opacity: 1; }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: var(--netflix-red); border-radius: 10px; }
        
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        
        #movieGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        @media (min-width: 1024px) { #movieGrid { grid-template-columns: repeat(5, 1fr); gap: 20px; } }
        
        .btn-red { background: var(--netflix-red); transition: 0.3s; }
        .btn-red:hover { background: #b20710; transform: scale(1.02); }
    </style>
</head>
<body>

    <nav id="navbar" class="fixed top-0 w-full z-[100] transition-all duration-300 px-4 md:px-12 py-5 flex items-center justify-between">
        <div class="flex items-center gap-4">
            <h1 class="text-xl md:text-3xl font-bold text-red-600 tracking-tighter uppercase">Gamon Era</h1>
        </div>
        <div class="flex items-center gap-3">
            <input type="text" id="searchInput" placeholder="Cari film..." class="hidden sm:block bg-black/40 border border-white/20 rounded-full px-4 py-1 text-sm outline-none focus:border-red-600 w-40 md:w-60">
            <button onclick="toggleUpload()" class="bg-red-600 px-4 py-1 rounded-md text-xs font-bold hover:bg-red-700 uppercase">Upload</button>
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Netflix-avatar.png" class="w-8 h-8 rounded" alt="User">
        </div>
    </nav>

    <section class="relative h-[60vh] md:h-[80vh] w-full flex items-center px-6 md:px-16 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.alphacoders.com/131/1311095.jpeg" class="w-full h-full object-cover brightness-[0.4]">
            <div class="absolute inset-0 bg-gradient-to-r from-black via-transparent to-transparent"></div>
            <div class="absolute bottom-0 w-full h-32 bg-gradient-to-t from-[#0f0f0f] to-transparent"></div>
        </div>
        <div class="relative z-10 max-w-2xl" data-aos="fade-up">
            <h2 class="text-4xl md:text-7xl font-bold mb-4">Interstellar</h2>
            <p class="text-gray-300 text-sm md:text-lg mb-8 line-clamp-2">Petualangan epik melintasi lubang cacing untuk menyelamatkan masa depan manusia.</p>
            <button onclick="document.getElementById('library').scrollIntoView()" class="px-8 py-3 bg-white text-black font-bold rounded-md hover:bg-gray-200 transition">Lihat Koleksi</button>
        </div>
    </section>

    <section id="library" class="py-12 px-4 md:px-12 bg-[#0f0f0f]">
        <h3 class="text-xl md:text-2xl font-semibold border-l-4 border-red-600 pl-3 mb-8">Global Library (Real-time)</h3>
        <div id="movieGrid">
            <div class="col-span-full text-center py-10 text-gray-500">Mencari video di server...</div>
        </div>
    </section>

    <div id="uploadModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-4 bg-black/90 backdrop-blur-sm">
        <div class="glass w-full max-w-lg p-6 rounded-2xl relative shadow-2xl">
            <button onclick="toggleUpload()" class="absolute top-4 right-4 text-3xl hover:text-red-500">&times;</button>
            <h2 class="text-2xl font-bold mb-6 text-red-600">Bagikan Video Global</h2>
            <form id="uploadForm" class="space-y-4">
                <input type="text" id="upTitle" placeholder="Judul Film" class="w-full bg-white/5 border border-white/20 p-3 rounded-lg outline-none focus:border-red-600" required>
                <textarea id="upDesc" placeholder="Deskripsi Singkat" class="w-full bg-white/5 border border-white/20 p-3 rounded-lg outline-none h-20" required></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <select id="upCat" class="bg-zinc-900 border border-white/20 p-3 rounded-lg outline-none text-sm">
                        <option value="Action">Action</option>
                        <option value="Horror">Horror</option>
                        <option value="Drama">Drama</option>
                        <option value="Anime">Anime</option>
                    </select>
                    <input type="url" id="upLink" placeholder="Link Video (.mp4)" class="bg-white/5 border border-white/20 p-3 rounded-lg outline-none text-sm" required>
                </div>
                <input type="url" id="upThumb" placeholder="Link Poster/Thumbnail (Google Image)" class="w-full bg-white/5 border border-white/20 p-3 rounded-lg outline-none focus:border-red-600 text-sm">
                <p class="text-[10px] text-gray-500 italic">Tips: Tempel link gambar dari Google agar thumbnail muncul sesuai video.</p>
                <button type="submit" class="w-full btn-red py-3 rounded-lg font-bold">PUBLISH VIDEO</button>
            </form>
        </div>
    </div>

    <div id="videoModal" class="fixed inset-0 z-[300] hidden flex-col items-center justify-center bg-black">
        <div class="w-full max-w-5xl px-2">
            <div class="flex justify-end mb-2">
                <button onclick="closePlayer()" class="text-white bg-red-600 px-4 py-2 rounded-md font-bold text-xs">TUTUP <i class="fa fa-times ml-1"></i></button>
            </div>
            <div class="video-wrapper rounded-lg overflow-hidden shadow-2xl">
                <video id="mainPlayer" controls autoplay crossorigin="anonymous">
                    <source src="" type="video/mp4">
                </video>
            </div>
            <div class="mt-4 p-4">
                <h2 id="playingTitle" class="text-2xl font-bold"></h2>
                <p id="playingDesc" class="text-gray-400 mt-2 text-sm leading-relaxed"></p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Konfigurasi Firebase Nell
        const firebaseConfig = {
            apiKey: "AIzaSyBrf7eFkgI9wtzA-to-3DgU75kOhXxD4cE",
            authDomain: "bokep-nell.firebaseapp.com",
            projectId: "bokep-nell",
            storageBucket: "bokep-nell.firebasestorage.app",
            messagingSenderId: "525720543599",
            appId: "1:525720543599:web:a428603a8b983b3c04889a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const moviesCol = collection(db, "movies");

        // Listen Data Real-time
        function initRealtime() {
            const q = query(moviesCol, orderBy("createdAt", "desc"));
            onSnapshot(q, (snapshot) => {
                const movies = [];
                snapshot.forEach(doc => movies.push({ id: doc.id, ...doc.data() }));
                renderUI(movies);
            }, (error) => {
                console.error("Firebase Error:", error);
            });
        }

        function renderUI(data) {
            const grid = document.getElementById('movieGrid');
            if(data.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-500">Belum ada video yang dibagikan.</div>`;
                return;
            }
            grid.innerHTML = data.map(m => `
                <div class="movie-card group" onclick="openPlayer('${m.link}', '${encodeURIComponent(m.title)}', '${encodeURIComponent(m.desc)}')" data-aos="zoom-in">
                    <div class="aspect-[2/3] relative rounded-md overflow-hidden bg-zinc-800">
                        <img src="${m.thumb || 'https://images.unsplash.com/photo-1594909122845-11baa439b7bf?w=500'}" class="w-full h-full object-cover group-hover:scale-110 duration-500">
                        <div class="card-overlay absolute inset-0 p-3 flex flex-col justify-end">
                            <h4 class="font-bold text-xs md:text-sm line-clamp-2">${m.title}</h4>
                            <p class="text-[10px] text-red-500 font-bold uppercase mt-1">${m.cat}</p>
                            <div class="mt-2 flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <span class="w-6 h-6 bg-white rounded-full flex items-center justify-center text-black text-[10px]"><i class="fa fa-play"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // Upload Logic
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            Swal.fire({ title: 'Sedang Memproses...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });

            const title = document.getElementById('upTitle').value;
            const desc = document.getElementById('upDesc').value;
            const link = document.getElementById('upLink').value;
            const cat = document.getElementById('upCat').value;
            const thumb = document.getElementById('upThumb').value;

            try {
                await addDoc(moviesCol, {
                    title, desc, link, cat, 
                    thumb: thumb || "https://images.unsplash.com/photo-1485846234645-a62644f84728?w=500",
                    createdAt: serverTimestamp()
                });

                Swal.fire('Berhasil!', 'Video kamu kini bisa dilihat semua orang.', 'success');
                toggleUpload();
                e.target.reset();
            } catch (err) {
                Swal.fire('Gagal!', err.message, 'error');
            }
        };

        // UI Window Handlers
        window.toggleUpload = () => {
            const m = document.getElementById('uploadModal');
            m.classList.toggle('hidden');
            m.classList.toggle('flex');
        };

        window.openPlayer = (link, title, desc) => {
            const video = document.getElementById('mainPlayer');
            document.getElementById('playingTitle').innerText = decodeURIComponent(title);
            document.getElementById('playingDesc').innerText = decodeURIComponent(desc);
            video.src = link;
            document.getElementById('videoModal').classList.remove('hidden');
            document.getElementById('videoModal').classList.add('flex');
            video.play().catch(e => console.log("Auto-play blocked"));
        };

        window.closePlayer = () => {
            const video = document.getElementById('mainPlayer');
            video.pause();
            video.src = "";
            document.getElementById('videoModal').classList.add('hidden');
            document.getElementById('videoModal').classList.remove('flex');
        };

        // Start App
        AOS.init({ duration: 800, once: true });
        initRealtime();

        window.onscroll = () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) nav.classList.add('nav-scrolled');
            else nav.classList.remove('nav-scrolled');
        };
    </script>
</body>
</html>
