<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gamon Era - Cinematic Pro Fix</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    
    <style>
        :root { --netflix-red: #E50914; --bg-dark: #0f0f0f; }
        body { font-family: 'Poppins', sans-serif; background-color: var(--bg-dark); color: white; overflow-x: hidden; padding-bottom: 80px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .movie-card { transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1); cursor: pointer; position: relative; border-radius: 12px; overflow: hidden; }
        .movie-card:hover { transform: scale(1.08); z-index: 50; }
        .preview-video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.6s ease; pointer-events: none; }
        .movie-card:hover .preview-video { opacity: 1; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; height: 75px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(20px); border-top: 1px solid rgba(255, 255, 255, 0.05); display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #777; font-size: 10px; cursor: pointer; }
        .nav-item.active { color: #E50914; }
        #movieGrid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        @media (min-width: 1024px) { #movieGrid { grid-template-columns: repeat(5, 1fr); gap: 25px; } }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; background: #000; border-radius: 16px; overflow: hidden; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .btn-delete { position: absolute; top: 8px; right: 8px; background: red; color: white; width: 30px; height: 30px; border-radius: 6px; z-index: 60; display: flex; items-center; justify-center; }
    </style>
</head>
<body>

    <nav id="navbar" class="fixed top-0 w-full z-[100] px-6 py-6 flex items-center justify-between transition-all">
        <h1 class="text-3xl font-extrabold text-red-600 italic">GAMON ERA</h1>
    </nav>

    <section class="relative h-[70vh] flex items-center px-6 md:px-16 overflow-hidden">
        <div class="absolute inset-0 -z-10 bg-gradient-to-t from-[#0f0f0f] to-transparent"></div>
        <div class="max-w-3xl" data-aos="fade-up">
            <h2 class="text-6xl font-black mb-5">Interstellar</h2>
            <p class="text-gray-400 mb-10">Menembus batas ruang dan waktu untuk menyelamatkan manusia.</p>
            <button onclick="document.getElementById('library').scrollIntoView({behavior:'smooth'})" class="px-10 py-4 bg-red-600 text-white font-bold rounded-full">Mulai Nonton</button>
        </div>
    </section>

    <section id="library" class="py-24 px-6 md:px-12">
        <h3 class="text-2xl font-bold mb-12 border-l-4 border-red-600 pl-5 uppercase">Global Library (Real-time)</h3>
        <div id="movieGrid"></div>
    </section>

    <div class="bottom-nav">
        <div class="nav-item active" onclick="switchTab('home')">
            <i class="fa fa-home text-xl"></i><span>Beranda</span>
        </div>
        <div class="nav-item" onclick="toggleUpload()">
            <i class="fa fa-plus-circle text-2xl text-red-600"></i><span>Post</span>
        </div>
        <div class="nav-item" onclick="toggleGuide()">
            <i class="fa fa-book text-xl"></i><span>Panduan</span>
        </div>
    </div>

    <div id="guideModal" class="fixed inset-0 z-[600] hidden items-center justify-center p-6 bg-black/95 backdrop-blur-lg">
        <div class="glass w-full max-w-xl p-10 rounded-3xl relative">
            <button onclick="toggleGuide()" class="absolute top-6 right-6 text-3xl">&times;</button>
            <h2 class="text-3xl font-black mb-8 text-red-600 uppercase">Panduan Upload</h2>
            <p class="mb-4">1. Buka <a href="https://catbox.moe" target="_blank" class="text-blue-400 underline">Catbox.moe</a>, upload video, salin link.</p>
            <p class="mb-4">2. Screenshot video untuk thumbnail, upload lagi ke Catbox, salin link gambar.</p>
            <button onclick="toggleGuide()" class="w-full py-4 mt-6 bg-red-600 rounded-xl font-bold">MENGERTI</button>
        </div>
    </div>

    <div id="uploadModal" class="fixed inset-0 z-[200] hidden items-center justify-center p-6 bg-black/90 backdrop-blur-lg">
        <div class="glass w-full max-w-xl p-10 rounded-3xl relative">
            <button onclick="toggleUpload()" class="absolute top-6 right-6 text-3xl">&times;</button>
            <h2 class="text-3xl font-black mb-8">Upload Video</h2>
            <form id="uploadForm" class="space-y-5">
                <input type="text" id="upTitle" placeholder="Judul Video" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10" required>
                <textarea id="upDesc" placeholder="Sinopsis..." class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10 h-24" required></textarea>
                <input type="url" id="upLink" placeholder="Link Video (.mp4)" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10" required>
                <input type="url" id="upThumb" placeholder="Link Thumbnail" class="w-full bg-white/5 p-4 rounded-xl outline-none border border-white/10">
                <button type="submit" class="w-full py-4 bg-red-600 rounded-xl font-bold">PUBLISH</button>
            </form>
        </div>
    </div>

    <div id="videoModal" class="fixed inset-0 z-[300] hidden flex-col items-center justify-center bg-black p-4">
        <div class="w-full max-w-6xl">
            <div class="flex justify-between mb-5">
                <h4 id="playingTitle" class="text-2xl font-bold"></h4>
                <button onclick="closePlayer()" class="bg-red-600 px-6 py-2 rounded-full font-bold">Tutup</button>
            </div>
            <div class="video-wrapper"><video id="mainPlayer" controls></video></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/studio-freight/lenis@1.0.19/dist/lenis.min.js"></script>

    <script>
        // FUNGSI NAVIGASI (Dikeluarkan dari module agar onclick bekerja)
        function toggleUpload() {
            const m = document.getElementById('uploadModal');
            m.classList.toggle('hidden'); m.classList.toggle('flex');
        }
        function toggleGuide() {
            const m = document.getElementById('guideModal');
            m.classList.toggle('hidden'); m.classList.toggle('flex');
        }
        function switchTab(tab) {
            if(tab === 'home') window.scrollTo({top: 0, behavior: 'smooth'});
        }
        function closePlayer() {
            const v = document.getElementById('mainPlayer');
            v.pause();
            document.getElementById('videoModal').classList.add('hidden');
        }

        // INIT LENIS DENGAN PROTEKSI
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof Lenis !== 'undefined') {
                const lenis = new Lenis();
                function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
                requestAnimationFrame(raf);
            }
            AOS.init({ duration: 1000, once: true });
        });
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, serverTimestamp, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBrf7eFkgI9wtzA-to-3DgU75kOhXxD4cE",
            authDomain: "bokep-nell.firebaseapp.com",
            projectId: "bokep-nell",
            storageBucket: "bokep-nell.firebasestorage.app",
            messagingSenderId: "525720543599",
            appId: "1:525720543599:web:a428603a8b983b3c04889a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const moviesCol = collection(db, "movies");

        // RENDER DATA
        onSnapshot(query(moviesCol, orderBy("createdAt", "desc")), (snapshot) => {
            const grid = document.getElementById('movieGrid');
            grid.innerHTML = '';
            snapshot.forEach(docSnap => {
                const m = docSnap.data();
                const id = docSnap.id;
                const card = document.createElement('div');
                card.className = "movie-card";
                card.innerHTML = `
                    <button class="btn-delete" data-id="${id}"><i class="fa fa-trash"></i></button>
                    <img src="${m.thumb}" class="w-full h-full object-cover">
                    <video class="preview-video" muted playsinline loop><source src="${m.link}" type="video/mp4"></video>
                    <div class="absolute inset-0 bg-gradient-to-t from-black p-4 flex flex-col justify-end text-sm font-bold">${m.title}</div>
                `;
                
                // Fix Play Interruption
                card.onmouseenter = () => { 
                    const v = card.querySelector('video');
                    const playPromise = v.play();
                    if (playPromise !== undefined) { playPromise.catch(() => {}); }
                };
                card.onmouseleave = () => { card.querySelector('video').pause(); };
                
                // Open Player
                card.onclick = (e) => {
                    if(e.target.closest('.btn-delete')) return;
                    const vp = document.getElementById('mainPlayer');
                    document.getElementById('playingTitle').innerText = m.title;
                    vp.src = m.link;
                    document.getElementById('videoModal').classList.remove('hidden');
                    document.getElementById('videoModal').classList.add('flex');
                    vp.play();
                };

                // Delete Logic
                card.querySelector('.btn-delete').onclick = async (e) => {
                    e.stopPropagation();
                    const confirm = await Swal.fire({ title: 'Hapus video?', icon: 'warning', showCancelButton: true });
                    if(confirm.isConfirmed) await deleteDoc(doc(db, "movies", id));
                };

                grid.appendChild(card);
            });
        });

        // UPLOAD LOGIC
        document.getElementById('uploadForm').onsubmit = async (e) => {
            e.preventDefault();
            await addDoc(moviesCol, {
                title: document.getElementById('upTitle').value,
                desc: document.getElementById('upDesc').value,
                link: document.getElementById('upLink').value,
                thumb: document.getElementById('upThumb').value,
                createdAt: serverTimestamp()
            });
            toggleUpload();
            e.target.reset();
            Swal.fire('Berhasil!', 'Video sudah dipost.', 'success');
        };
    </script>
</body>
</html>
